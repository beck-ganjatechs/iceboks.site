<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Tunnel — iceboks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060608; overflow: hidden; }
  canvas { display: block; }
  .back { position: fixed; top: 1.5rem; left: 1.5rem; z-index: 10; font-family: 'Inter', sans-serif; font-size: 0.75rem; color: rgba(212,160,23,0.5); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.3s; }
  .back:hover { color: #d4a017; }
  .title { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 10; font-family: Georgia, serif; font-size: 0.8rem; color: rgba(212,160,23,0.3); letter-spacing: 0.2em; text-transform: uppercase; pointer-events: none; }
  .logo { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; opacity: 0.08; width: 200px; height: 200px; }
  .logo img { width: 100%; height: 100%; object-fit: contain; }
</style>
</head>
<body>
<a href="../index.html" class="back">← iceboks.site</a>
<div class="title">Quantum Tunnel</div>
<div class="logo"><img src="../site.assests/image.jpg" alt=""></div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, mx = 0, my = 0, t = 0, speed = 1;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; cx = W/2; cy = H/2; }
resize();
addEventListener('resize', resize);
addEventListener('mousemove', e => { mx = (e.clientX - cx) / cx; my = (e.clientY - cy) / cy; });
addEventListener('wheel', e => { speed = Math.max(0.2, Math.min(5, speed + e.deltaY * 0.002)); });

// Tunnel rings — nested Flower of Life circles receding into depth
const NUM_RINGS = 40;
const rings = [];

for (let i = 0; i < NUM_RINGS; i++) {
  rings.push({
    z: i * 25, // depth
    rotOffset: Math.random() * Math.PI * 2,
    petals: 6 + (i % 3 === 0 ? 6 : 0), // Some rings have 12 petals
    gold: i % 5 === 0,
    frost: i % 7 === 0,
  });
}

// Depth particles flying through the tunnel
const stars = [];
for (let i = 0; i < 300; i++) {
  stars.push({
    x: (Math.random() - 0.5) * 800,
    y: (Math.random() - 0.5) * 800,
    z: Math.random() * 1000,
    size: Math.random() * 1.5 + 0.3,
    gold: Math.random() > 0.6,
  });
}

function project(x, y, z) {
  const fov = 500;
  const depth = Math.max(z, 1);
  const scale = fov / depth;
  return {
    x: cx + (x + mx * 100) * scale,
    y: cy + (y + my * 100) * scale,
    scale,
    alpha: Math.max(0, 1 - z / 1000),
  };
}

function drawFlowerRing(z, rot, petals, isGold, isFrost) {
  const p = project(0, 0, z);
  if (p.alpha < 0.02) return;

  const baseRadius = 120 * p.scale;
  if (baseRadius < 2 || baseRadius > 2000) return;

  const alpha = p.alpha;

  // Center circle
  ctx.beginPath();
  ctx.arc(p.x, p.y, baseRadius, 0, Math.PI * 2);
  if (isGold) {
    ctx.strokeStyle = `rgba(212, 160, 23, ${alpha * 0.4})`;
  } else if (isFrost) {
    ctx.strokeStyle = `rgba(180, 210, 255, ${alpha * 0.5})`;
  } else {
    ctx.strokeStyle = `rgba(140, 140, 170, ${alpha * 0.25})`;
  }
  ctx.lineWidth = Math.max(0.3, 1.5 * p.scale);
  ctx.stroke();

  // Petal circles
  for (let i = 0; i < petals; i++) {
    const a = (Math.PI * 2 / petals) * i + rot;
    const px = p.x + Math.cos(a) * baseRadius;
    const py = p.y + Math.sin(a) * baseRadius;

    ctx.beginPath();
    ctx.arc(px, py, baseRadius, 0, Math.PI * 2);

    if (isGold) {
      ctx.strokeStyle = `rgba(212, 160, 23, ${alpha * 0.25})`;
      ctx.shadowColor = `rgba(212, 160, 23, ${alpha * 0.15})`;
      ctx.shadowBlur = 15 * p.scale;
    } else if (isFrost) {
      ctx.strokeStyle = `rgba(180, 210, 255, ${alpha * 0.3})`;
      ctx.shadowColor = `rgba(180, 210, 255, ${alpha * 0.1})`;
      ctx.shadowBlur = 10 * p.scale;
    } else {
      ctx.strokeStyle = `rgba(120, 120, 160, ${alpha * 0.15})`;
      ctx.shadowBlur = 0;
    }
    ctx.lineWidth = Math.max(0.2, 0.8 * p.scale);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Vesica Piscis intersections (gold accent dots)
  if (isGold && baseRadius > 10) {
    for (let i = 0; i < petals; i++) {
      const a1 = (Math.PI * 2 / petals) * i + rot;
      const a2 = (Math.PI * 2 / petals) * ((i + 1) % petals) + rot;
      const ix = p.x + (Math.cos(a1) + Math.cos(a2)) * baseRadius * 0.5;
      const iy = p.y + (Math.sin(a1) + Math.sin(a2)) * baseRadius * 0.5;

      ctx.beginPath();
      ctx.arc(ix, iy, Math.max(1, 3 * p.scale), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(212, 160, 23, ${alpha * 0.5})`;
      ctx.shadowColor = 'rgba(212, 160, 23, 0.5)';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

function drawStars() {
  for (const s of stars) {
    s.z -= speed * 3;
    if (s.z < 1) {
      s.z = 1000;
      s.x = (Math.random() - 0.5) * 800;
      s.y = (Math.random() - 0.5) * 800;
    }

    const p = project(s.x, s.y, s.z);
    if (p.alpha < 0.05) continue;

    const streakLength = speed * 3 * p.scale;

    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    const backP = project(s.x, s.y, s.z + speed * 3);
    ctx.lineTo(backP.x, backP.y);

    if (s.gold) {
      ctx.strokeStyle = `rgba(212, 160, 23, ${p.alpha * 0.6})`;
      ctx.lineWidth = s.size * p.scale * 2;
    } else {
      ctx.strokeStyle = `rgba(180, 190, 220, ${p.alpha * 0.4})`;
      ctx.lineWidth = s.size * p.scale;
    }
    ctx.stroke();
  }
}

// Center glow
function drawCenterGlow() {
  const pulse = Math.sin(t * 0.8) * 0.1 + 0.2;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 200);
  grad.addColorStop(0, `rgba(212, 160, 23, ${pulse * 0.15})`);
  grad.addColorStop(0.3, `rgba(107, 33, 168, ${pulse * 0.08})`);
  grad.addColorStop(0.6, `rgba(0, 229, 255, ${pulse * 0.03})`);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function animate() {
  t += 0.016;

  // Motion blur effect
  ctx.fillStyle = 'rgba(6, 6, 8, 0.2)';
  ctx.fillRect(0, 0, W, H);

  drawCenterGlow();

  // Move rings toward camera
  for (const ring of rings) {
    ring.z -= speed * 2;
    if (ring.z < 1) {
      ring.z = NUM_RINGS * 25;
      ring.gold = Math.random() > 0.8;
      ring.frost = Math.random() > 0.85;
    }
  }

  // Sort by depth (far to near) and draw
  const sorted = rings.slice().sort((a, b) => b.z - a.z);
  for (const ring of sorted) {
    const rot = ring.rotOffset + t * 0.1 * (ring.gold ? 1.5 : 1);
    drawFlowerRing(ring.z, rot, ring.petals, ring.gold, ring.frost);
  }

  drawStars();

  // Vignette
  const vignette = ctx.createRadialGradient(cx, cy, Math.min(W, H) * 0.3, cx, cy, Math.max(W, H) * 0.7);
  vignette.addColorStop(0, 'transparent');
  vignette.addColorStop(1, 'rgba(6, 6, 8, 0.7)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
