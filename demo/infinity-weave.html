<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Weave — iceboks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060608; overflow: hidden; cursor: crosshair; }
  canvas { display: block; }
  .back { position: fixed; top: 1.5rem; left: 1.5rem; z-index: 10; font-family: 'Inter', sans-serif; font-size: 0.75rem; color: rgba(212,160,23,0.5); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.3s; }
  .back:hover { color: #d4a017; }
  .title { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 10; font-family: Georgia, serif; font-size: 0.8rem; color: rgba(212,160,23,0.3); letter-spacing: 0.2em; text-transform: uppercase; pointer-events: none; }
</style>
</head>
<body>
<a href="../index.html" class="back">← iceboks.site</a>
<div class="title">Infinity Weave</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, mx = 0, my = 0, t = 0, clicking = false, clickT = 0;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; cx = W/2; cy = H/2; }
resize();
addEventListener('resize', resize);
addEventListener('mousemove', e => { mx = (e.clientX - cx) / cx; my = (e.clientY - cy) / cy; });
addEventListener('mousedown', () => { clicking = true; clickT = 0; });
addEventListener('mouseup', () => { clicking = false; });

const NUM = 1200;
const particles = [];
for (let i = 0; i < NUM; i++) {
  const tParam = (i / NUM) * Math.PI * 2;
  particles.push({
    t: tParam,
    speed: 0.003 + Math.random() * 0.004,
    offset: (Math.random() - 0.5) * 20,
    offsetY: (Math.random() - 0.5) * 20,
    size: Math.random() * 1.8 + 0.5,
    gold: Math.random() > 0.4,
    explodeVx: 0, explodeVy: 0, ex: 0, ey: 0
  });
}

// Background Flower of Life circles
const bgCircles = [];
for (let i = 0; i < 8; i++) {
  bgCircles.push({
    x: Math.random() * 2 - 1,
    y: Math.random() * 2 - 1,
    vx: (Math.random() - 0.5) * 0.0003,
    vy: (Math.random() - 0.5) * 0.0003,
    r: 60 + Math.random() * 80,
    phase: Math.random() * Math.PI * 2
  });
}

function lemniscate(tt, a) {
  const s = Math.sin(tt);
  const c = Math.cos(tt);
  const denom = 1 + s * s;
  return { x: a * c / denom, y: a * s * c / denom };
}

function animate() {
  ctx.fillStyle = 'rgba(6,6,8,0.15)';
  ctx.fillRect(0, 0, W, H);
  t += 0.008;
  if (clicking) clickT = Math.min(clickT + 0.03, 1);
  else clickT = Math.max(clickT - 0.02, 0);

  const breathe = 1 + Math.sin(t * 0.5) * 0.08;
  const a = Math.min(W, H) * 0.3 * breathe;

  // Perspective tilt from mouse
  const skewX = mx * 0.15;
  const skewY = my * 0.1;

  // Background Flower of Life
  ctx.save();
  for (const bc of bgCircles) {
    bc.x += bc.vx; bc.y += bc.vy;
    bc.phase += 0.003;
    if (bc.x > 1.5 || bc.x < -1.5) bc.vx *= -1;
    if (bc.y > 1.5 || bc.y < -1.5) bc.vy *= -1;
    const bx = cx + bc.x * cx;
    const by = cy + bc.y * cy;
    const alpha = 0.03 + Math.sin(bc.phase) * 0.015;
    ctx.beginPath();
    ctx.arc(bx, by, bc.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(180,190,210,${alpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    // Surrounding petals
    for (let j = 0; j < 6; j++) {
      const ang = j * Math.PI / 3 + t * 0.1;
      ctx.beginPath();
      ctx.arc(bx + Math.cos(ang) * bc.r, by + Math.sin(ang) * bc.r, bc.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(180,190,210,${alpha * 0.5})`;
      ctx.stroke();
    }
  }
  ctx.restore();

  // Draw particles along infinity
  for (const p of particles) {
    p.t += p.speed;
    if (p.t > Math.PI * 2) p.t -= Math.PI * 2;

    const pos = lemniscate(p.t, a);
    // Apply 3D perspective tilt
    let px = pos.x * (1 + skewY * 0.3) + pos.y * skewX * 0.5;
    let py = pos.y * (1 + skewX * 0.2) + pos.x * skewY * 0.3;

    // Add offset for thickness
    const tang = Math.atan2(
      lemniscate(p.t + 0.01, a).y - pos.y,
      lemniscate(p.t + 0.01, a).x - pos.x
    );
    const nx = -Math.sin(tang);
    const ny = Math.cos(tang);
    px += nx * p.offset;
    py += ny * p.offsetY;

    // Explosion on click
    if (clickT > 0) {
      if (p.explodeVx === 0 && clicking) {
        p.explodeVx = (Math.random() - 0.5) * 8;
        p.explodeVy = (Math.random() - 0.5) * 8;
      }
      p.ex += p.explodeVx * clickT;
      p.ey += p.explodeVy * clickT;
      p.explodeVx *= 0.98;
      p.explodeVy *= 0.98;
    }
    if (!clicking) {
      p.ex *= 0.93;
      p.ey *= 0.93;
      if (Math.abs(p.ex) < 0.1) { p.explodeVx = 0; p.ex = 0; }
      if (Math.abs(p.ey) < 0.1) { p.explodeVy = 0; p.ey = 0; }
    }

    const fx = cx + px + p.ex;
    const fy = cy + py + p.ey;

    const pulse = 0.6 + Math.sin(p.t * 3 + t) * 0.4;
    ctx.beginPath();
    ctx.arc(fx, fy, p.size * pulse, 0, Math.PI * 2);
    if (p.gold) {
      ctx.fillStyle = `rgba(212,160,23,${0.5 + pulse * 0.4})`;
    } else {
      ctx.fillStyle = `rgba(180,210,255,${0.4 + pulse * 0.3})`;
    }
    ctx.fill();
  }

  // Glow overlay on the infinity path
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.beginPath();
  for (let i = 0; i <= 200; i++) {
    const tt = (i / 200) * Math.PI * 2;
    const pos = lemniscate(tt, a);
    let px = pos.x * (1 + skewY * 0.3) + pos.y * skewX * 0.5;
    let py = pos.y * (1 + skewX * 0.2) + pos.x * skewY * 0.3;
    if (i === 0) ctx.moveTo(cx + px, cy + py);
    else ctx.lineTo(cx + px, cy + py);
  }
  ctx.strokeStyle = `rgba(212,160,23,${0.04 + Math.sin(t) * 0.02})`;
  ctx.lineWidth = 8;
  ctx.stroke();
  ctx.restore();

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
