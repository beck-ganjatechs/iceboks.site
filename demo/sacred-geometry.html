<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sacred Geometry Portal — iceboks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060608; overflow: hidden; cursor: crosshair; }
  canvas { display: block; }
  #synapse-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.25;
  }
  #c {
    position: fixed;
    top: 0; left: 0;
    z-index: 1;
  }
  .back { position: fixed; top: 1.5rem; left: 1.5rem; z-index: 10; font-family: 'Inter', sans-serif; font-size: 0.75rem; color: rgba(212,160,23,0.5); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.3s; }
  .back:hover { color: #d4a017; }
  .title { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 10; font-family: Georgia, serif; font-size: 0.8rem; color: rgba(212,160,23,0.3); letter-spacing: 0.2em; text-transform: uppercase; pointer-events: none; }
</style>
</head>
<body>
<a href="../index.html" class="back">&larr; iceboks.site</a>
<div class="title">Sacred Geometry Portal</div>
<canvas id="synapse-canvas"></canvas>
<canvas id="c"></canvas>
<script src="../site.assets/synapse-bg.js"></script>
<script src="../site.assets/player.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, mx = 0, my = 0, t = 0;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; cx = W/2; cy = H/2; }
resize();
addEventListener('resize', resize);
addEventListener('mousemove', e => { mx = (e.clientX - cx) / cx; my = (e.clientY - cy) / cy; });

function flowerOfLife(x, y, r, rot, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(180, 180, 200, ${alpha * 0.4})`;
  ctx.lineWidth = 0.8;
  ctx.stroke();

  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i;
    const px = Math.cos(angle) * r;
    const py = Math.sin(angle) * r;

    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    const isGold = i % 2 === 0;
    const baseR = isGold ? 212 : 160;
    const baseG = isGold ? 160 : 160;
    const baseB = isGold ? 23 : 180;
    ctx.strokeStyle = `rgba(${baseR}, ${baseG}, ${baseB}, ${alpha * 0.3})`;
    ctx.lineWidth = 0.6 + alpha * 0.4;
    ctx.stroke();
  }
  ctx.restore();
}

// Fewer particles, smaller, slower
const particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({
    angle: Math.random() * Math.PI * 2,
    radius: Math.random() * 300 + 50,
    speed: (Math.random() - 0.5) * 0.004,
    radialSpeed: (Math.random() - 0.5) * 0.15,
    size: Math.random() * 1.5 + 0.3,
    gold: Math.random() > 0.5,
    life: Math.random(),
    decay: 0.0008 + Math.random() * 0.0012,
  });
}

function drawParticles() {
  for (const p of particles) {
    p.angle += p.speed;
    p.radius += p.radialSpeed;
    p.life -= p.decay;

    if (p.life <= 0 || p.radius < 10 || p.radius > Math.max(W, H) * 0.5) {
      p.angle = Math.random() * Math.PI * 2;
      p.radius = Math.random() * 300 + 50;
      p.life = 1;
    }

    const x = cx + Math.cos(p.angle) * p.radius;
    const y = cy + Math.sin(p.angle) * p.radius;
    const alpha = p.life * 0.4;

    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI * 2);
    if (p.gold) {
      ctx.fillStyle = `rgba(212, 160, 23, ${alpha})`;
    } else {
      ctx.fillStyle = `rgba(168, 85, 247, ${alpha})`;
    }
    ctx.fill();
  }
}

function drawGlow() {
  const pulse = Math.sin(t * 0.4) * 0.1 + 0.2;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 300);
  grad.addColorStop(0, `rgba(212, 160, 23, ${pulse * 0.06})`);
  grad.addColorStop(0.5, `rgba(107, 33, 168, ${pulse * 0.03})`);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function animate() {
  t += 0.016;
  ctx.clearRect(0, 0, W, H);

  drawGlow();

  const breathe = Math.sin(t * 0.25) * 15;
  const mouseRot = mx * 0.08;
  const mouseScale = 1 + my * 0.03;

  flowerOfLife(cx, cy, (200 + breathe) * mouseScale, t * 0.015 + mouseRot, 0.1);
  flowerOfLife(cx, cy, (140 + breathe * 0.7) * mouseScale, -t * 0.02 + mouseRot, 0.2);
  flowerOfLife(cx, cy, (80 + breathe * 0.4) * mouseScale, t * 0.035 + mouseRot, 0.45);
  flowerOfLife(cx, cy, (35 + breathe * 0.2) * mouseScale, -t * 0.05 + mouseRot, 0.7);

  // Vesica Piscis — subtler
  const vr = (50 + breathe * 0.3) * mouseScale;
  for (let i = 0; i < 3; i++) {
    const a = (Math.PI * 2 / 3) * i + t * 0.03;
    const vx = cx + Math.cos(a) * vr * 0.3;
    const vy = cy + Math.sin(a) * vr * 0.3;
    ctx.beginPath();
    ctx.arc(vx, vy, vr, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(212, 160, 23, ${0.08 + Math.sin(t + i) * 0.04})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  drawParticles();

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
