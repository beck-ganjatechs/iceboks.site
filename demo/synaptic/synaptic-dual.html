<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dual Brain — Synaptic Web</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#060608;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:1.5rem;left:1.5rem;z-index:10;font-family:'Inter',sans-serif;font-size:0.75rem;color:rgba(212,160,23,0.5);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase}
  .back-link:hover{color:rgba(212,160,23,0.9)}
  .title{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);font-family:Georgia,serif;font-size:0.8rem;color:rgba(212,160,23,0.3);white-space:nowrap}
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; iceboks.site</a>
<canvas id="c"></canvas>
<div class="title">Dual Brain</div>
<script>
(function(){
  const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
  let W,H;
  const MAX_N=150,MAX_E=400;
  let nX,nY,nCD,nA,nSide,nCount=0; // nSide: 0=left,1=right,2=bridge
  let eA,eB,eBridge,eCount=0; // eBridge: is this a bridge edge?
  let signals=[];
  let mouseX=0,mouseY=0;

  function build(){
    nCount=0;eCount=0;signals=[];
    nX=new Float32Array(MAX_N);nY=new Float32Array(MAX_N);
    nCD=new Float32Array(MAX_N);nA=new Float32Array(MAX_N);
    nSide=new Uint8Array(MAX_N);
    eA=new Uint8Array(MAX_E);eB=new Uint8Array(MAX_E);
    eBridge=new Uint8Array(MAX_E);

    const spacing=Math.min(W/2,H)*0.065;
    const sqrt3=Math.sqrt(3);
    const midX=W/2;

    // LEFT BRAIN: hex grid (orderly)
    const lCols=Math.floor((W*0.42)/(spacing*1.2));
    const lRows=Math.floor(H*0.7/(spacing*sqrt3*0.5));
    const lOffX=(W*0.45-lCols*spacing*1.2)/2+spacing*0.5;
    const lOffY=(H-lRows*spacing*sqrt3*0.5)/2;
    const leftStart=nCount;
    for(let r=0;r<lRows&&nCount<70;r++){
      for(let c=0;c<lCols&&nCount<70;c++){
        nX[nCount]=lOffX+c*spacing*1.2+(r%2?spacing*0.6:0);
        nY[nCount]=lOffY+r*spacing*sqrt3*0.5;
        nA[nCount]=0.4;nSide[nCount]=0;nCount++;
      }
    }
    const leftEnd=nCount;

    // RIGHT BRAIN: random (chaotic)
    const rightStart=nCount;
    const rCenterX=W*0.72,rCenterY=H*0.5;
    const rRadius=Math.min(W*0.22,H*0.35);
    for(let i=0;i<60&&nCount<MAX_N-5;i++){
      const a=Math.random()*Math.PI*2;
      const r2=Math.sqrt(Math.random())*rRadius;
      nX[nCount]=rCenterX+Math.cos(a)*r2;
      nY[nCount]=rCenterY+Math.sin(a)*r2;
      nA[nCount]=0.4;nSide[nCount]=1;nCount++;
    }
    const rightEnd=nCount;

    // edges within left
    const maxD=spacing*1.6;
    for(let i=leftStart;i<leftEnd&&eCount<MAX_E;i++){
      for(let j=i+1;j<leftEnd&&eCount<MAX_E;j++){
        const dx=nX[i]-nX[j],dy=nY[i]-nY[j];
        if(dx*dx+dy*dy<maxD*maxD){eA[eCount]=i;eB[eCount]=j;eBridge[eCount]=0;eCount++}
      }
    }
    // edges within right
    const maxD2=spacing*2.0;
    for(let i=rightStart;i<rightEnd&&eCount<MAX_E;i++){
      for(let j=i+1;j<rightEnd&&eCount<MAX_E;j++){
        const dx=nX[i]-nX[j],dy=nY[i]-nY[j];
        if(dx*dx+dy*dy<maxD2*maxD2){eA[eCount]=i;eB[eCount]=j;eBridge[eCount]=0;eCount++}
      }
    }

    // BRIDGE: find closest pairs across hemispheres
    const bridges=[];
    for(let i=leftStart;i<leftEnd;i++){
      for(let j=rightStart;j<rightEnd;j++){
        const dx=nX[i]-nX[j],dy=nY[i]-nY[j];
        bridges.push({i,j,d:dx*dx+dy*dy});
      }
    }
    bridges.sort((a,b)=>a.d-b.d);
    for(let k=0;k<4&&eCount<MAX_E;k++){
      eA[eCount]=bridges[k].i;eB[eCount]=bridges[k].j;eBridge[eCount]=1;eCount++;
    }
  }

  function fireNode(ni,color){
    if(nCD[ni]>0)return;
    nCD[ni]=50;nA[ni]=1.0;
    for(let e=0;e<eCount;e++){
      let t=-1;
      if(eA[e]===ni)t=eB[e]; else if(eB[e]===ni)t=eA[e];
      if(t>=0){
        let sigColor=color||'gold';
        // change color when crossing bridge
        if(eBridge[e]){
          sigColor=(nSide[ni]===0)?'cyan':'purple';
        }
        signals.push({fx:nX[ni],fy:nY[ni],tx:nX[t],ty:nY[t],t:0,target:t,color:sigColor,bridge:eBridge[e]});
      }
    }
  }

  canvas.addEventListener('click',function(e){
    let best=-1,bestD=Infinity;
    for(let i=0;i<nCount;i++){
      const dx=e.clientX-nX[i],dy=e.clientY-nY[i],d=dx*dx+dy*dy;
      if(d<bestD){bestD=d;best=i}
    }
    if(best>=0&&bestD<4000)fireNode(best,nSide[best]===0?'gold':'gold');
  });
  canvas.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY});

  function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;build()}

  function colorToRGBA(c,a){
    if(c==='gold')return`rgba(212,160,23,${a})`;
    if(c==='cyan')return`rgba(64,220,255,${a})`;
    if(c==='purple')return`rgba(180,100,255,${a})`;
    return`rgba(200,200,210,${a})`;
  }

  function animate(){
    ctx.fillStyle='rgba(6,6,8,0.2)';
    ctx.fillRect(0,0,W,H);

    // divider line
    ctx.fillStyle='rgba(100,100,120,0.05)';
    ctx.fillRect(W/2-1,0,2,H);

    // edges - normal
    ctx.beginPath();ctx.strokeStyle='rgba(140,140,160,0.08)';ctx.lineWidth=0.6;
    for(let e=0;e<eCount;e++){
      if(!eBridge[e]){ctx.moveTo(nX[eA[e]],nY[eA[e]]);ctx.lineTo(nX[eB[e]],nY[eB[e]])}
    }
    ctx.stroke();
    // bridge edges - brighter
    ctx.beginPath();ctx.strokeStyle='rgba(180,150,200,0.2)';ctx.lineWidth=1.5;
    for(let e=0;e<eCount;e++){
      if(eBridge[e]){ctx.moveTo(nX[eA[e]],nY[eA[e]]);ctx.lineTo(nX[eB[e]],nY[eB[e]])}
    }
    ctx.stroke();

    // nodes
    for(let i=0;i<nCount;i++){
      if(nCD[i]>0){nCD[i]--;nA[i]=0.2+0.5*(nCD[i]/50)}
      else if(nA[i]<0.4)nA[i]+=0.005;
      const dx=mouseX-nX[i],dy=mouseY-nY[i],d2=dx*dx+dy*dy;
      const extra=d2<6000?0.3*(1-Math.sqrt(d2)/78):0;
      const al=Math.min(1,nA[i]+extra);
      if(nSide[i]===0){
        ctx.fillStyle=`rgba(200,200,220,${al})`;
      }else{
        ctx.fillStyle=`rgba(200,190,210,${al})`;
      }
      ctx.fillRect(nX[i]-2,nY[i]-2,4,4);
    }

    // signals
    for(let i=signals.length-1;i>=0;i--){
      const s=signals[i];
      s.t+=0.03;
      if(s.t>=1){
        fireNode(s.target,s.color);
        signals.splice(i,1);continue;
      }
      const sx=s.fx+(s.tx-s.fx)*s.t,sy=s.fy+(s.ty-s.fy)*s.t;
      const a=1-s.t*0.4;
      if(s.bridge){
        // glow for bridge crossing
        ctx.fillStyle=colorToRGBA(s.color,a*0.2);
        ctx.beginPath();ctx.arc(sx,sy,8,0,6.283);ctx.fill();
      }
      ctx.fillStyle=colorToRGBA(s.color,a);
      ctx.fillRect(sx-3,sy-3,6,6);
    }

    if(signals.length>150)signals.splice(0,signals.length-80);
    requestAnimationFrame(animate);
  }

  resize();addEventListener('resize',resize);animate();
})();
</script>
</body>
</html>
