<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frost Crystal Growth — iceboks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060608; overflow: hidden; cursor: crosshair; }
  canvas { display: block; }
  .back { position: fixed; top: 1.5rem; left: 1.5rem; z-index: 10; font-family: 'Inter', sans-serif; font-size: 0.75rem; color: rgba(180,200,230,0.5); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.3s; }
  .back:hover { color: #b0c8e8; }
  .title { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 10; font-family: Georgia, serif; font-size: 0.8rem; color: rgba(180,200,230,0.3); letter-spacing: 0.2em; text-transform: uppercase; pointer-events: none; }
  .hint { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 10; font-family: 'Inter', sans-serif; font-size: 0.65rem; color: rgba(180,200,230,0.3); letter-spacing: 0.05em; pointer-events: none; }
</style>
</head>
<body>
<a href="../index.html" class="back">← iceboks.site</a>
<div class="title">Frost Crystal Growth</div>
<div class="hint">click to seed crystals</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, t = 0;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

// Crystal branches
const branches = [];
const MAX_BRANCHES = 3000;

function spawnCrystal(x, y) {
  const numArms = 6;
  for (let i = 0; i < numArms; i++) {
    const angle = (Math.PI * 2 / numArms) * i;
    branches.push({
      x, y, angle,
      length: 0,
      maxLength: 60 + Math.random() * 120,
      speed: 0.4 + Math.random() * 0.8,
      width: 1.5 + Math.random() * 1.5,
      gold: Math.random() > 0.7,
      depth: 0,
      spawned: false,
      opacity: 0.8 + Math.random() * 0.2,
    });
  }
}

// Seed initial crystal
spawnCrystal(innerWidth / 2, innerHeight / 2);

addEventListener('click', e => {
  if (branches.length < MAX_BRANCHES) {
    spawnCrystal(e.clientX, e.clientY);
  }
});

function growBranches() {
  const newBranches = [];

  for (const b of branches) {
    if (b.length >= b.maxLength) {
      // Spawn sub-branches at 60-degree angles (hexagonal symmetry)
      if (!b.spawned && b.depth < 4 && branches.length + newBranches.length < MAX_BRANCHES) {
        b.spawned = true;
        const endX = b.x + Math.cos(b.angle) * b.length;
        const endY = b.y + Math.sin(b.angle) * b.length;

        for (let side = -1; side <= 1; side += 2) {
          const subAngle = b.angle + side * (Math.PI / 3) + (Math.random() - 0.5) * 0.15;
          newBranches.push({
            x: endX, y: endY,
            angle: subAngle,
            length: 0,
            maxLength: b.maxLength * (0.5 + Math.random() * 0.2),
            speed: b.speed * (0.7 + Math.random() * 0.3),
            width: Math.max(0.3, b.width * 0.65),
            gold: Math.random() > 0.75,
            depth: b.depth + 1,
            spawned: false,
            opacity: b.opacity * 0.85,
          });
        }
      }
      continue;
    }

    b.length += b.speed;
  }

  for (const nb of newBranches) branches.push(nb);
}

function drawBranches() {
  for (const b of branches) {
    if (b.length <= 0) continue;
    const endX = b.x + Math.cos(b.angle) * b.length;
    const endY = b.y + Math.sin(b.angle) * b.length;

    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(endX, endY);

    if (b.gold) {
      ctx.strokeStyle = `rgba(212, 160, 23, ${b.opacity * 0.7})`;
      ctx.shadowColor = 'rgba(212, 160, 23, 0.4)';
    } else {
      const blue = 200 + Math.sin(t + b.angle) * 30;
      ctx.strokeStyle = `rgba(180, 200, ${blue}, ${b.opacity * 0.6})`;
      ctx.shadowColor = `rgba(180, 200, ${blue}, 0.3)`;
    }
    ctx.lineWidth = b.width;
    ctx.shadowBlur = b.gold ? 10 : 6;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Tiny sparkle at growing tip
    if (b.length < b.maxLength) {
      const sparkle = Math.sin(t * 5 + b.angle * 3) * 0.4 + 0.6;
      ctx.beginPath();
      ctx.arc(endX, endY, b.width + 1, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${sparkle * 0.4})`;
      ctx.fill();
    }
  }
}

// Floating frost particles
const dustParticles = [];
for (let i = 0; i < 80; i++) {
  dustParticles.push({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    vx: (Math.random() - 0.5) * 0.3,
    vy: -Math.random() * 0.2 - 0.1,
    size: Math.random() * 2 + 0.5,
    alpha: Math.random() * 0.3,
  });
}

function drawDust() {
  for (const p of dustParticles) {
    p.x += p.vx + Math.sin(t + p.y * 0.01) * 0.2;
    p.y += p.vy;
    if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
    if (p.x < -10) p.x = W + 10;
    if (p.x > W + 10) p.x = -10;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 220, 255, ${p.alpha})`;
    ctx.fill();
  }
}

// Hexagonal grid faintly in background
function drawHexGrid() {
  const size = 40;
  const h = size * Math.sqrt(3);
  ctx.strokeStyle = 'rgba(100, 120, 150, 0.03)';
  ctx.lineWidth = 0.5;

  for (let row = -1; row < H / h + 1; row++) {
    for (let col = -1; col < W / (size * 3) + 1; col++) {
      const x = col * size * 3 + (row % 2 ? size * 1.5 : 0);
      const y = row * h;

      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 6;
        const px = x + Math.cos(a) * size;
        const py = y + Math.sin(a) * size;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }
}

function animate() {
  t += 0.016;

  // Slow fade for trails
  ctx.fillStyle = 'rgba(6, 6, 8, 0.03)';
  ctx.fillRect(0, 0, W, H);

  if (Math.floor(t * 60) % 120 === 0) {
    // Redraw hex grid periodically (very faint)
    drawHexGrid();
  }

  growBranches();
  drawBranches();
  drawDust();

  requestAnimationFrame(animate);
}

// Initial hex grid
drawHexGrid();
animate();
</script>
</body>
</html>
