<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Forge — iceboks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060608; overflow: hidden; cursor: crosshair; }
  canvas { display: block; }
  .back { position: fixed; top: 1.5rem; left: 1.5rem; z-index: 10; font-family: 'Inter', sans-serif; font-size: 0.75rem; color: rgba(212,160,23,0.5); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.3s; }
  .back:hover { color: #d4a017; }
  .title { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 10; font-family: Georgia, serif; font-size: 0.8rem; color: rgba(212,160,23,0.3); letter-spacing: 0.2em; text-transform: uppercase; pointer-events: none; }
</style>
</head>
<body>
<a href="../index.html" class="back">← iceboks.site</a>
<div class="title">Logo Forge</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, mx = -9999, my = -9999, t = 0;

function resize() {
  W = canvas.width = innerWidth; H = canvas.height = innerHeight;
  cx = W/2; cy = H/2;
  buildTargets();
}
resize();
addEventListener('resize', resize);
addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
addEventListener('mouseleave', () => { mx = -9999; my = -9999; });

const NUM = 1500;
const particles = [];
let targets = []; // array of {x,y} target positions
let phase = 0; // 0=text1, 1=hold, 2=explode, 3=flower, 4=hold, 5=explode, 6=text2, 7=hold, 8=explode
let phaseTimer = 0;
const phases = [
  { name: 'converge', duration: 180 },
  { name: 'hold', duration: 120 },
  { name: 'explode', duration: 60 },
  { name: 'converge', duration: 180 },
  { name: 'hold', duration: 120 },
  { name: 'explode', duration: 60 },
  { name: 'converge', duration: 180 },
  { name: 'hold', duration: 120 },
  { name: 'explode', duration: 60 }
];
let currentShape = 0; // 0=iceboks, 1=flower, 2=quantum text

function getTextPositions(text, fontSize) {
  const offscreen = document.createElement('canvas');
  offscreen.width = W; offscreen.height = H;
  const octx = offscreen.getContext('2d');
  octx.fillStyle = 'white';
  octx.font = `bold ${fontSize}px Georgia`;
  octx.textAlign = 'center';
  octx.textBaseline = 'middle';
  octx.fillText(text, cx, cy);
  const data = octx.getContext('2d').getImageData(0, 0, W, H).data;
  const points = [];
  const gap = 4;
  for (let y = 0; y < H; y += gap) {
    for (let x = 0; x < W; x += gap) {
      if (data[(y * W + x) * 4 + 3] > 128) {
        points.push({ x, y });
      }
    }
  }
  return points;
}

function getFlowerPositions() {
  const points = [];
  const r = Math.min(W, H) * 0.22;
  // Center circle + 6 surrounding
  const centers = [{ x: 0, y: 0 }];
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3;
    centers.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
  }
  for (const c of centers) {
    const numPts = 60;
    for (let i = 0; i < numPts; i++) {
      const a = (i / numPts) * Math.PI * 2;
      points.push({ x: cx + c.x + Math.cos(a) * r, y: cy + c.y + Math.sin(a) * r });
    }
  }
  // Fill to match particle count with scattered points on circles
  while (points.length < NUM) {
    const ci = Math.floor(Math.random() * centers.length);
    const c = centers[ci];
    const a = Math.random() * Math.PI * 2;
    const rr = r * (0.3 + Math.random() * 0.7);
    points.push({ x: cx + c.x + Math.cos(a) * rr, y: cy + c.y + Math.sin(a) * rr });
  }
  return points;
}

function buildTargets() {
  let pts;
  if (currentShape === 0) {
    const fs = Math.min(W * 0.12, 120);
    pts = getTextPositions('iceboks', fs);
  } else if (currentShape === 1) {
    pts = getFlowerPositions();
  } else {
    const fs = Math.min(W * 0.06, 60);
    pts = getTextPositions('Quantum Research Lab', fs);
  }
  targets = [];
  for (let i = 0; i < NUM; i++) {
    if (pts.length > 0) {
      targets.push(pts[i % pts.length]);
    } else {
      targets.push({ x: Math.random() * W, y: Math.random() * H });
    }
  }
}

// Init particles
for (let i = 0; i < NUM; i++) {
  particles.push({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    vx: 0, vy: 0,
    size: Math.random() * 2 + 0.5,
    gold: Math.random() > 0.35
  });
}

buildTargets();

function animate() {
  ctx.fillStyle = 'rgba(6,6,8,0.12)';
  ctx.fillRect(0, 0, W, H);
  t++;
  phaseTimer++;

  const p = phases[phase];
  if (phaseTimer > p.duration) {
    phaseTimer = 0;
    phase++;
    if (phase >= phases.length) phase = 0;
    // On explode->converge transitions, change shape
    if (phases[phase].name === 'converge') {
      currentShape = (currentShape + 1) % 3;
      buildTargets();
    }
  }

  const isConverge = phases[phase].name === 'converge';
  const isHold = phases[phase].name === 'hold';
  const isExplode = phases[phase].name === 'explode';

  for (let i = 0; i < NUM; i++) {
    const pt = particles[i];
    const tgt = targets[i];

    if (isConverge || isHold) {
      const dx = tgt.x - pt.x;
      const dy = tgt.y - pt.y;
      pt.vx += dx * 0.04;
      pt.vy += dy * 0.04;
      pt.vx *= 0.85;
      pt.vy *= 0.85;
    } else if (isExplode) {
      if (phaseTimer === 1) {
        pt.vx = (Math.random() - 0.5) * 20;
        pt.vy = (Math.random() - 0.5) * 20;
      }
      pt.vx *= 0.97;
      pt.vy *= 0.97;
    }

    // Mouse repulsion
    const mdx = pt.x - mx;
    const mdy = pt.y - my;
    const md = mdx * mdx + mdy * mdy;
    const repRadius = 12000;
    if (md < repRadius && md > 0) {
      const force = (repRadius - md) / repRadius * 3;
      const dist = Math.sqrt(md);
      pt.vx += (mdx / dist) * force;
      pt.vy += (mdy / dist) * force;
    }

    pt.x += pt.vx;
    pt.y += pt.vy;

    // Draw
    const alpha = isHold ? 0.9 : (isConverge ? 0.5 + (phaseTimer / p.duration) * 0.4 : Math.max(0.2, 1 - phaseTimer / p.duration));
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
    if (pt.gold) {
      ctx.fillStyle = `rgba(212,160,23,${alpha})`;
    } else {
      ctx.fillStyle = `rgba(180,210,255,${alpha})`;
    }
    ctx.fill();
  }

  // Glow effect during hold
  if (isHold) {
    const glowAlpha = 0.02 + Math.sin(t * 0.05) * 0.01;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = `rgba(212,160,23,${glowAlpha})`;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
